<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodWagon_Landing_Page</title>
    <!-- link font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
    <!-- icon cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <!-- figma link -->
    <!-- https://www.figma.com/design/44Pf7SsSlaweJP4dKycoOc/FoodWagon-Food-Delivery-Landing-Template-by-ThemeWagon--Community-?node-id=342-144&p=f&t=nzNE5LDhbe0IAezA-0 -->
    <!-- link css -->
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <!--========================== 
    header markaping start
     ===============================-->
    <!-- nav section -->
    <nav>
        <div class="container">
            <div class="header_inner d-flex">
                <div class="logo">
                    <img src="./images/Logo.png" alt="">
                </div>

                <div class="location">
                    <p><span class="text_bold">Deliver to:</span><i class="fa-solid fa-location-dot"></i>
                        &nbsp;Current Location<span span class="text_bold">
                            Mohammadpur
                            Bus Stand, Dhaka </span> </p>
                </div>

                <div class="login">
                    <i class="fa-solid fa-magnifying-glass"></i> <span class="text_bold">Search Food </span> <button
                        class="comon_button"><i class="fa-solid fa-user"></i>
                        Login</button>
                </div>
            </div>
        </div>
    </nav>
    <header class="hero_section">
        <!--========================== 
    hero start
     ===============================-->
        <div class="container">
            <div class="hero_inner d-flex">
                <div class="hero_text d-flex">
                    <h2>Are you starving?</h2>
                    <p>Within a few clicks, find meals that are accessible near you</p>
                    <div class="Order_Card d-flex">
                        <div class="Order_Card_icon">
                            <span> <img src="./images/icon/bike.png" alt="">&nbsp;Delivery</span>
                            <span> <img src="./images/icon/basket.png" alt=""> &nbsp;Pickup</span>
                        </div>

                        <div class="location">
                            <!-- input search  -->
                            <i class="fa-solid fa-location-dot input_icon_location"></i>
                            <input type="text" placeholder="Enter Your Address">

                            <!-- find button -->
                            <button class="comon_button"> <i class="fa-solid fa-magnifying-glass search_input"></i>
                                &nbsp;<span class="search_input_text">Find
                                    Food</span></button>
                        </div>
                    </div>
                </div>
                <div class="hero_img">
                    <img src="./images/hero_Image_one.png" alt="">
                </div>
            </div>
        </div>
    </header>

</body>

</html>
